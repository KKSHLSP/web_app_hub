<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>辰趣閣</title>
  <style>
    :root {
      --bg:#1f1511;
      --bg-2:#281b16;
      --paper:#f6eadf;
      --paper-2:#ecd8c5;
      --ink:#2d1d17;
      --ink-soft:#674f44;
      --line:rgba(93,61,47,.18);
      --accent:#b85c38;
      --accent-2:#d68c5b;
      --accent-3:#6c8b6b;
      --shadow:0 18px 40px rgba(31,21,17,.16);
    }
    * { box-sizing:border-box; }
    html,body { margin:0; min-height:100%; background:
      radial-gradient(circle at top left, rgba(214,140,91,.22), transparent 28%),
      linear-gradient(180deg, #efe2d1 0%, #f5ecdf 42%, #efe2d1 100%);
      color:var(--ink);
      font-family:"Avenir Next","PingFang TC","PingFang SC","Noto Sans TC",sans-serif;
    }
    body { padding-bottom:24px; }
    button,input,select {
      font:inherit;
      border:none;
      border-radius:16px;
    }
    button {
      cursor:pointer;
      padding:12px 16px;
      background:var(--ink);
      color:#fffaf6;
      box-shadow:var(--shadow);
    }
    input,select {
      width:100%;
      padding:12px 14px;
      background:rgba(255,255,255,.78);
      border:1px solid rgba(93,61,47,.12);
      color:var(--ink);
    }
    .shell {
      max-width:1200px;
      margin:0 auto;
      padding:18px 16px 0;
    }
    .topbar {
      padding:14px 0 10px;
    }
    .hero {
      background:linear-gradient(140deg, rgba(255,248,242,.86), rgba(242,220,204,.9));
      border:1px solid rgba(93,61,47,.1);
      border-radius:28px;
      padding:18px;
      box-shadow:var(--shadow);
    }
    .hero-head {
      display:flex;
      gap:12px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }
    .hero p, .subtle { color:var(--ink-soft); }
    .actions, .filter-row, .badge-row, .font-row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    .badge {
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.64);
      border:1px solid rgba(93,61,47,.1);
      color:var(--ink-soft);
      font-size:13px;
    }
    .btn-secondary { background:#fffaf6; color:var(--ink); border:1px solid rgba(93,61,47,.12); box-shadow:none; }
    .btn-accent { background:linear-gradient(135deg, var(--accent), var(--accent-2)); }
    .layout {
      display:grid;
      grid-template-columns:360px 1fr;
      gap:16px;
      margin-top:16px;
    }
    .panel {
      background:rgba(255,249,244,.88);
      border:1px solid rgba(93,61,47,.1);
      border-radius:26px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }
    .panel-inner { padding:16px; }
    .catalog-head {
      display:grid;
      gap:10px;
      padding:16px;
      border-bottom:1px solid rgba(93,61,47,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.72), rgba(244,231,219,.88));
    }
    .stats {
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:10px;
      margin-top:10px;
    }
    .stat {
      background:rgba(255,255,255,.72);
      border:1px solid rgba(93,61,47,.08);
      border-radius:18px;
      padding:12px;
    }
    .stat .k { font-size:12px; color:var(--ink-soft); }
    .stat .v { margin-top:4px; font-weight:800; font-size:20px; }
    .tag-grid {
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      padding-bottom:4px;
    }
    .tag-chip {
      flex:none;
      padding:8px 12px;
      border-radius:999px;
      background:#fffaf5;
      border:1px solid rgba(93,61,47,.12);
      color:var(--ink-soft);
      cursor:pointer;
      white-space:nowrap;
    }
    .tag-chip.active { background:var(--ink); color:#fff7f2; border-color:transparent; }
    .catalog-list {
      display:grid;
      gap:12px;
      padding:14px;
      max-height:calc(100vh - 320px);
      overflow:auto;
    }
    .work-card {
      padding:15px;
      border-radius:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(247,236,225,.96));
      border:1px solid rgba(93,61,47,.08);
      cursor:pointer;
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .work-card:hover { transform:translateY(-1px); }
    .work-card.active {
      border-color:rgba(184,92,56,.34);
      box-shadow:0 14px 30px rgba(184,92,56,.16);
    }
    .work-card h3 { margin:0 0 6px; font-size:18px; line-height:1.35; }
    .meta-line {
      display:flex;
      justify-content:space-between;
      gap:8px;
      color:var(--ink-soft);
      font-size:13px;
    }
    .score-pill {
      display:inline-flex;
      align-items:center;
      gap:6px;
      padding:7px 10px;
      border-radius:999px;
      background:rgba(184,92,56,.08);
      color:var(--accent);
      font-weight:700;
    }
    .muted-score { color:#8d7368; }
    .card-tags {
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:10px;
    }
    .card-tag {
      padding:6px 10px;
      border-radius:999px;
      background:rgba(108,139,107,.1);
      color:#3e6040;
      font-size:12px;
    }
    .detail-head {
      padding:18px;
      background:
        radial-gradient(circle at right top, rgba(214,140,91,.18), transparent 24%),
        linear-gradient(180deg, rgba(255,253,249,.82), rgba(246,232,219,.92));
      border-bottom:1px solid rgba(93,61,47,.08);
    }
    .detail-body { padding:18px; display:grid; gap:16px; }
    .title-line { display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    .title-line h2 { margin:0; font-size:clamp(24px, 4vw, 34px); line-height:1.2; }
    .summary-box, .content-box, .related-box, .score-box {
      background:rgba(255,255,255,.72);
      border:1px solid rgba(93,61,47,.08);
      border-radius:22px;
      padding:16px;
    }
    .score-grid {
      display:grid;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:10px;
    }
    .score-item {
      background:#fffaf5;
      border:1px solid rgba(93,61,47,.08);
      border-radius:18px;
      padding:12px;
    }
    .score-item .k { font-size:12px; color:var(--ink-soft); }
    .score-item .v { font-size:22px; font-weight:800; margin-top:4px; }
    .progress-wrap {
      width:100%;
      height:10px;
      background:rgba(93,61,47,.08);
      border-radius:999px;
      overflow:hidden;
    }
    .progress-bar {
      height:100%;
      width:0%;
      background:linear-gradient(90deg, var(--accent), var(--accent-2));
      border-radius:999px;
    }
    .content-box {
      position:relative;
      padding:0;
      overflow:hidden;
    }
    .content-head {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      padding:12px 16px;
      background:rgba(255,249,244,.94);
      border-bottom:1px solid rgba(93,61,47,.08);
      backdrop-filter:blur(10px);
    }
    .detail-link { display:inline-flex; margin-top:12px; padding:8px 12px; border-radius:999px; background:#fffaf5; border:1px solid rgba(93,61,47,.12); color:var(--ink-soft); }
    .reader-scroll {
      max-height:none;
      overflow:visible;
      padding:20px 18px 26px;
      scroll-behavior:smooth;
      width:100%;
    }
    .reader-scroll p {
      margin:0 0 16px;
      font-family:"Iowan Old Style","Songti TC","STSong","Noto Serif TC",serif;
      font-size:var(--reader-size, 19px);
      line-height:var(--reader-line-height, 1.9);
      letter-spacing:.02em;
      width:100%;
      max-width:100%;
      overflow-wrap:anywhere;
      word-break:break-word;
      white-space:pre-wrap;
    }
    .related-list {
      display:flex;
      gap:10px;
      overflow:auto;
      padding-bottom:2px;
    }
    .related-card {
      min-width:240px;
      background:#fffaf5;
      border:1px solid rgba(93,61,47,.08);
      border-radius:18px;
      padding:14px;
      cursor:pointer;
    }
    .empty {
      padding:26px;
      text-align:center;
      color:var(--ink-soft);
    }
    .overlay {
      position:fixed;
      inset:0;
      z-index:50;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      background:rgba(31,21,17,.55);
      backdrop-filter:blur(10px);
    }
    .detail-link { display:inline-flex; margin-top:12px; padding:8px 12px; border-radius:999px; background:#fffaf5; border:1px solid rgba(93,61,47,.12); color:var(--ink-soft); }
    .gate {
      width:min(480px, 100%);
      background:linear-gradient(180deg, rgba(255,252,248,.98), rgba(243,229,214,.98));
      border-radius:28px;
      padding:22px;
      box-shadow:0 28px 60px rgba(31,21,17,.28);
      border:1px solid rgba(255,255,255,.34);
    }
    .gate h2 { margin:0 0 8px; }
    .gate .subtle { margin-bottom:16px; }
    a { color:var(--accent); text-decoration:none; }
    .status-line { min-height:22px; color:var(--ink-soft); font-size:13px; }
    @media (max-width: 980px) {
      .layout { grid-template-columns:1fr; }
      .catalog-list { max-height:none; }
      .reader-scroll { max-height:none; }
      .score-grid { grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .stats { grid-template-columns:repeat(2, minmax(0, 1fr)); }
      .detail-head { position:static; }
    }
    @media (max-width: 600px) {
      .shell { padding:12px 12px 0; }
      .hero, .detail-head, .detail-body, .catalog-head, .panel-inner { padding:14px; }
      .stats { grid-template-columns:1fr 1fr; }
      .score-grid { grid-template-columns:1fr 1fr; }
      .reader-scroll { padding:16px 14px 24px; overflow-x:hidden; }
      .reader-scroll p { font-size:var(--reader-size, 18px); }
      .content-box, .summary-box, .score-box, .related-box { overflow:hidden; }
      .title-line { align-items:flex-start; }
    }
  </style>
</head>
<body>
  <div id="gateOverlay" class="overlay">
    <div class="gate">
      <p><a href="/">← 返回合集首頁</a></p>
      <h2>辰趣閣</h2>
      <p class="subtle">這個入口獨立於另外兩個 app，需要額外密碼。預設已適配手機瀏覽器，正文為滑動閱讀。</p>
      <div style="display:grid; gap:12px;">
        <input id="readerPassword" type="password" placeholder="輸入辰趣閣密碼（只輸入數字即可）" />
        <button class="btn-accent" id="unlockBtn">解鎖閱讀庫</button>
        <div class="status-line" id="gateStatus"></div>
      </div>
    </div>
  </div>

  <div class="shell">
    <div class="topbar">
      <section class="hero">
        <div class="hero-head">
          <div>
            <p><a href="/">← 返回合集首頁</a></p>
            <h1 style="margin:0 0 8px; font-size:clamp(28px, 5vw, 42px);">辰趣閣</h1>
            <p class="subtle" style="margin:0;">支持搜索、標籤推薦與手機閱讀。</p>
          </div>
          <div class="badge-row">
            <div class="badge" id="userBadge">未選使用者</div>
            
          </div>
        </div>
        <div class="actions" style="margin-top:14px;">
          
          
          
          <a class="badge" href="/settings">閱讀設定</a>
        </div>
      </section>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="catalog-head">
          <div class="filter-row">
            <input id="searchInput" placeholder="搜索作品、作者、簡介或標籤" />
          </div>
          <div class="filter-row">
            <select id="sortSelect">
              <option value="recommended">推薦</option>
              <option value="tag_fit">作品與標籤契合度</option>
              <option value="related">關聯度</option>
              <option value="rating">作品評分</option>
              <option value="latest">最近更新</option>
            </select>
          </div>
          <div class="tag-grid" id="tagStrip"></div>
          <div class="stats">
            <div class="stat"><div class="k">作品總數</div><div class="v" id="worksCount">0</div></div>
            <div class="stat"><div class="k">作者數</div><div class="v" id="authorsCount">0</div></div>
            <div class="stat"><div class="k">當前命中</div><div class="v" id="hitCount">0</div></div>
          </div>
        </div>
        <div id="catalogList" class="catalog-list"></div>
      </section>

      <section class="panel">
        <div class="detail-head" id="detailHead">
          <div class="empty">從左側挑一本作品開始。</div>
        </div>
        <div class="detail-body" id="detailBody" style="display:none;">
          <section class="summary-box">
            <div class="title-line">
              <div>
                <h2 id="detailTitle"></h2>
                <p class="subtle" id="detailAuthor" style="margin:6px 0 0;"></p>
              </div>
              <div class="score-pill" id="detailScore">預估分 0</div>
            </div>
            <p id="detailSummary" style="margin:16px 0 12px;"></p>
            <div class="card-tags" id="detailTags"></div>
            <div style="margin-top:14px; display:grid; gap:10px;">
              <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
              <div class="meta-line">
                <span id="progressLabel">閱讀進度 0%</span>
                <span id="detailMeta">0 字</span>
              </div>
            </div>
            <div class="actions" style="margin-top:14px;">
              <button class="btn-secondary" id="jumpContinueBtn">回到上次位置</button>
            </div>
          </section>

          <section class="score-box">
            <div class="meta-line" style="margin-bottom:12px;">
              <strong>評分拆解</strong>
              <span class="subtle" id="scoreReason">尚未生成 AI 評語</span>
            </div>
            <div class="score-grid">
              <div class="score-item"><div class="k">總分</div><div class="v" id="scoreOverall">0</div></div>
              <div class="score-item"><div class="k">情緒拉扯</div><div class="v" id="scoreEmotion">0</div></div>
              <div class="score-item"><div class="k">角色化學反應</div><div class="v" id="scoreChemistry">0</div></div>
              <div class="score-item"><div class="k">辛辣程度</div><div class="v" id="scoreSpice">0</div></div>
              <div class="score-item"><div class="k">閱讀流暢度</div><div class="v" id="scoreReadability">0</div></div>
            </div>
          </section>

          <section class="content-box">
            <div class="content-head">
              <strong>滑動閱讀</strong>
              <div class="font-row">
                <button class="btn-secondary" id="fontDownBtn" style="padding:8px 12px;">A-</button>
                <button class="btn-secondary" id="fontUpBtn" style="padding:8px 12px;">A+</button>
              </div>
            </div>
            <div class="reader-scroll" id="readerScroll"></div>
          </section>

          <section class="related-box">
            <div class="meta-line" style="margin-bottom:12px;">
              <strong>相關作品</strong>
              <span class="subtle">按作者、標籤、主分類與關聯度排序</span>
            </div>
            <div class="related-list" id="relatedList"></div>
          </section>
        </div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      token: localStorage.getItem('reader_access_token') || '',
      user: null,
      works: [],
      facets: { totalWorks: 0, totalAuthors: 0, tags: [] },
      selectedTags: [],
      sort: 'recommended',
      query: '',
      currentWork: null,
      content: null,
      fontSize: Number(localStorage.getItem('reader_font_size') || 19),
      saveTimer: null,
      contentCache: new Map(),
      openingWorkId: null,
      hasOpenedProgressSaved: false,
    };

    const gateOverlay = document.getElementById('gateOverlay');
    const gateStatus = document.getElementById('gateStatus');
    const userBadge = document.getElementById('userBadge');
    const tagStrip = document.getElementById('tagStrip');
    const catalogList = document.getElementById('catalogList');
    const detailHead = document.getElementById('detailHead');
    const detailBody = document.getElementById('detailBody');
    const readerScroll = document.getElementById('readerScroll');

    function loadCurrentUser() {
      try { state.user = JSON.parse(localStorage.getItem('hub_selected_user') || 'null'); }
      catch { state.user = null; }
      userBadge.textContent = state.user ? `使用者：${state.user.name}` : '未選使用者';
    }

    function setReaderReady(ready) {
      gateOverlay.style.display = ready ? 'none' : 'flex';
    }

    async function api(url, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (state.token) headers['X-Reader-Token'] = state.token;
      const res = await fetch(url, { ...options, headers });
      const data = await res.json().catch(() => ({ error: 'bad response' }));
      if (res.status === 401) {
        localStorage.removeItem('reader_access_token');
        state.token = '';
        setReaderReady(false);
        throw new Error(data.error || 'reader auth required');
      }
      if (!res.ok) throw new Error(data.error || 'request failed');
      return data;
    }

    function escapeHtml(text) {
      return String(text || '').replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[char]);
    }

    function scoreLabel(work) {
      return work.ai_score != null ? `AI ${work.score}` : `預估 ${work.score}`;
    }

    function renderTags() {
      const topTags = state.facets.tags || [];
      tagStrip.innerHTML = '';
      for (const tag of topTags) {
        const button = document.createElement('button');
        button.className = 'tag-chip' + (state.selectedTags.includes(tag.name) ? ' active' : '');
        button.textContent = `${tag.name} · ${tag.count}`;
        button.onclick = () => {
          if (state.selectedTags.includes(tag.name)) state.selectedTags = state.selectedTags.filter(item => item !== tag.name);
          else state.selectedTags = [...state.selectedTags, tag.name];
          loadWorks();
        };
        tagStrip.appendChild(button);
      }
    }

    function renderCatalog() {
      document.getElementById('worksCount').textContent = state.facets.totalWorks || 0;
      document.getElementById('authorsCount').textContent = state.facets.totalAuthors || 0;
      document.getElementById('hitCount').textContent = state.works.length;

      if (!state.works.length) {
        catalogList.innerHTML = '<div class="empty">沒有命中作品，換個關鍵字或少選幾個標籤。</div>';
        return;
      }

      catalogList.innerHTML = '';
      for (const work of state.works) {
        const card = document.createElement('article');
        card.className = 'work-card' + (state.currentWork && state.currentWork.id === work.id ? ' active' : '');
        card.innerHTML = `
          <div class="meta-line">
            <span>${escapeHtml(work.author)}</span>
            <span class="score-pill ${work.ai_score == null ? 'muted-score' : ''}">${escapeHtml(scoreLabel(work))}</span>
          </div>
          <h3>${escapeHtml(work.title)}</h3>
          <p class="subtle" style="margin:0;">${escapeHtml(work.ai_score != null ? (work.summary || work.excerpt || "") : "")}</p>
          <span class="detail-link">進入作品頁</span>
          <div class="meta-line" style="margin-top:10px;">
            <span>契合 ${Number(work.tag_fit_score || 0).toFixed(0)}</span>
            <span>關聯 ${Number(work.relation_score || 0).toFixed(0)}</span>
          </div>
          <div class="card-tags">${(work.tags || []).slice(0, 4).map(tag => `<span class="card-tag">${escapeHtml(tag)}</span>`).join('')}</div>
        `;
        card.onclick = () => openWork(work.id, true);
        catalogList.appendChild(card);
      }
    }

    function renderDetail(work, related) {
      state.currentWork = work;
      detailHead.style.display = 'none';
      detailBody.style.display = 'grid';
      document.getElementById('detailTitle').textContent = work.title;
      document.getElementById('detailAuthor').textContent = `${work.author} · ${work.primary_category || '都市言情'}`;
      document.getElementById('detailScore').textContent = scoreLabel(work);
      document.getElementById('detailSummary').textContent = work.intro || work.summary || work.excerpt || '暫無簡介';
      document.getElementById('detailMeta').textContent = `${work.char_count || 0} 字 · ${work.chapter_count || 0} 章節`;
      document.getElementById('progressLabel').textContent = `閱讀進度 ${Number(work.progress || 0).toFixed(0)}%`;
      document.getElementById('progressBar').style.width = `${Math.max(0, Math.min(100, Number(work.progress || 0)))}%`;
      document.getElementById('scoreReason').textContent = work.ai_reason || (work.ai_score != null ? 'AI 評分已生成' : '目前為規則預估分，尚未跑本地 AI');
      const metrics = work.ai_metrics || {};
      document.getElementById('scoreOverall').textContent = Math.round(work.score || 0);
      document.getElementById('scoreEmotion').textContent = Math.round(metrics.emotion || work.score || 0);
      document.getElementById('scoreChemistry').textContent = Math.round(metrics.chemistry || work.score || 0);
      document.getElementById('scoreSpice').textContent = Math.round(metrics.spice || work.score || 0);
      document.getElementById('scoreReadability').textContent = Math.round(metrics.readability || work.score || 0);

      const tagsRoot = document.getElementById('detailTags');
      tagsRoot.innerHTML = '';
      for (const tag of work.tags || []) {
        const span = document.createElement('span');
        span.className = 'card-tag';
        span.textContent = tag;
        tagsRoot.appendChild(span);
      }

      const relatedRoot = document.getElementById('relatedList');
      relatedRoot.innerHTML = '';
      for (const item of related || []) {
        const card = document.createElement('div');
        card.className = 'related-card';
        card.innerHTML = `
          <strong>${escapeHtml(item.title)}</strong>
          <p class="subtle" style="margin:8px 0;">${escapeHtml(item.author)} · ${escapeHtml(item.primary_category || '')}</p>
          <p class="subtle" style="margin:0;">${escapeHtml(item.summary || item.excerpt || '')}</p>
        `;
        card.onclick = () => openWork(item.id, true);
        relatedRoot.appendChild(card);
      }

      renderCatalog();
    }

    function renderContent(content, lastScroll = 0) {
      state.content = content;
      document.documentElement.style.setProperty('--reader-size', `${state.fontSize}px`);
      readerScroll.innerHTML = (content.paragraphs || []).map(paragraph => `<p>${escapeHtml(paragraph)}</p>`).join('');
      readerScroll.scrollTop = lastScroll || 0;
    }

    async function unlockReader() {
      gateStatus.textContent = '驗證中...';
      try {
        const password = document.getElementById('readerPassword').value;
        const data = await api('/api/reader/auth', {
          method: 'POST',
          body: JSON.stringify({ password }),
          headers: {},
        });
        state.token = data.token;
        localStorage.setItem('reader_access_token', state.token);
        setReaderReady(true);
        gateStatus.textContent = '';
        await bootstrap();
      } catch (error) {
        gateStatus.textContent = error.message;
      }
    }

    async function bootstrap() {
      loadCurrentUser();
      try {
        const params = new URLSearchParams({
          user_id: String(state.user?.id || 0),
          sort: state.sort,
          q: state.query,
          tags: state.selectedTags.join(','),
        });
        const data = await api(`/api/reader/bootstrap?${params.toString()}`);
        state.works = data.works || [];
        state.facets = data.facets || { totalWorks: 0, totalAuthors: 0, tags: [] };
        renderTags();
        renderCatalog();
        if (!state.currentWork && state.works[0]) await openWork(state.works[0].id, false);
      } catch (error) {
        gateStatus.textContent = error.message;
        setReaderReady(false);
      }
    }

    async function loadWorks() {
      const params = new URLSearchParams({
        user_id: String(state.user?.id || 0),
        q: state.query,
        sort: state.sort,
        tags: state.selectedTags.join(','),
        limit: '60',
      });
      const data = await api(`/api/reader/works?${params.toString()}`);
      state.works = data.works || [];
      renderTags();
      renderCatalog();
      if (state.currentWork) {
        const stillExists = state.works.find(item => item.id === state.currentWork.id);
        if (!stillExists && state.works[0]) await openWork(state.works[0].id, false);
      }
    }

    async function openWork(id, scrollIntoView) {
      if (state.openingWorkId === id) return;
      state.openingWorkId = id;
      try {
        const params = new URLSearchParams({
          id: String(id),
          user_id: String(state.user?.id || 0),
        });
        const workPromise = api(`/api/reader/work?${params.toString()}`);
        const cachedContent = state.contentCache.get(id);
        const contentPromise = cachedContent ? Promise.resolve({ content: cachedContent }) : api(`/api/reader/content?id=${id}`);
        const [data, content] = await Promise.all([workPromise, contentPromise]);
        renderDetail(data.work, data.related || []);
        if (!cachedContent && content?.content) state.contentCache.set(id, content.content);
        renderContent(content.content, Number(data.work.last_scroll || 0));
        state.hasOpenedProgressSaved = false;
        if (scrollIntoView && window.innerWidth < 980) detailBody.scrollIntoView({ behavior: 'smooth', block: 'start' });
      } finally {
        state.openingWorkId = null;
      }
    }

    async function saveProgress(opened = false) {
      if (!state.currentWork || !state.user) return;
      if (opened) {
        if (state.hasOpenedProgressSaved) return;
        state.hasOpenedProgressSaved = true;
      }
      const scrollHeight = readerScroll.scrollHeight - readerScroll.clientHeight;
      const progress = scrollHeight > 0 ? (readerScroll.scrollTop / scrollHeight) * 100 : 0;
      document.getElementById('progressBar').style.width = `${Math.max(progress, Number(state.currentWork.progress || 0))}%`;
      document.getElementById('progressLabel').textContent = `閱讀進度 ${Math.max(progress, Number(state.currentWork.progress || 0)).toFixed(0)}%`;
      await api('/api/reader/progress', {
        method: 'POST',
        body: JSON.stringify({
          user_id: state.user.id,
          work_id: state.currentWork.id,
          progress,
          last_scroll: readerScroll.scrollTop,
          opened,
        }),
      });
    }

    function queueProgressSave() {
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(() => saveProgress(false).catch(() => {}), 900);
    }

    async function refreshCurrentAi() {
      if (!state.currentWork) return;
      document.getElementById('scoreReason').textContent = 'AI 補評分中...';
      const data = await api('/api/reader/ai/refresh', {
        method: 'POST',
        body: JSON.stringify({ work_id: state.currentWork.id }),
      });
      const result = (data.results || [])[0];
      if (!result?.ok) {
        document.getElementById('scoreReason').textContent = result?.error || 'AI 補評分失敗';
        return;
      }
      await openWork(state.currentWork.id, false);
      await loadWorks();
    }

    async function batchRefreshAi() {
      await api('/api/reader/ai/refresh', {
        method: 'POST',
        body: JSON.stringify({ limit: 8 }),
      });
      await loadWorks();
      if (state.currentWork) await openWork(state.currentWork.id, false);
    }

    async function reindexLibrary() {
      await api('/api/reader/reindex', {
        method: 'POST',
        body: JSON.stringify({}),
      });
      await bootstrap();
    }

    function updateFont(delta) {
      state.fontSize = Math.max(16, Math.min(28, state.fontSize + delta));
      localStorage.setItem('reader_font_size', String(state.fontSize));
      document.documentElement.style.setProperty('--reader-size', `${state.fontSize}px`);
    }

    document.getElementById('unlockBtn').onclick = unlockReader;
    document.getElementById('readerPassword').addEventListener('keydown', event => {
      if (event.key === 'Enter') unlockReader();
    });
    document.getElementById('refreshBtn').onclick = () => loadWorks().catch(error => alert(error.message));
    document.getElementById('batchAiBtn').onclick = () => batchRefreshAi().catch(error => alert(error.message));
    document.getElementById('reindexBtn').onclick = () => reindexLibrary().catch(error => alert(error.message));
    document.getElementById('jumpContinueBtn').onclick = () => {
      if (!state.currentWork) return;
      readerScroll.scrollTop = Number(state.currentWork.last_scroll || 0);
    };
    document.getElementById('sortSelect').onchange = event => {
      state.sort = event.target.value;
      loadWorks().catch(error => alert(error.message));
    };
    document.getElementById('searchInput').addEventListener('input', event => {
      state.query = event.target.value.trim();
      clearTimeout(window.readerSearchTimer);
      window.readerSearchTimer = setTimeout(() => loadWorks().catch(error => alert(error.message)), 280);
    });
    document.getElementById('fontDownBtn').onclick = () => updateFont(-1);
    document.getElementById('fontUpBtn').onclick = () => updateFont(1);
    readerScroll.addEventListener('scroll', queueProgressSave);

    loadCurrentUser();
    setReaderReady(Boolean(state.token));
    if (state.token) bootstrap();
  </script>
</body>
</html>
